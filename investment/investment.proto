syntax = "proto3";

package investment;

option go_package = "github.com/MuhammadMiftaa/Refina-Protobuf/investment";

service InvestmentService {
    rpc GetInvestments (GetInvestmentOptions) returns (stream Investment);
    rpc GetUserInvestments (UserID) returns (stream Investment);
    rpc GetUserInvestmentList (GetUserInvestmentListRequest) returns (GetUserInvestmentListResponse);
    rpc GetInvestmentDetail (GetInvestmentDetailRequest) returns (Investment);
    rpc CreateInvestment (CreateInvestmentRequest) returns (Investment);
    rpc SellInvestment (SellInvestmentRequest) returns (SellInvestmentResponse);
    rpc GetInvestmentSummary (UserID) returns (InvestmentSummaryResponse);
    rpc GetAssetCodes (Empty) returns (GetAssetCodesResponse);
}

// ── Common Messages ──

message Empty {}

message AssetCode {
    string code = 1;
    string name = 2;
    string unit = 3;
    double toUSD = 4;
    double toEUR = 5;
    double toIDR = 6;
    string created_at = 7;
    string updated_at = 8;
}

message Investment {
    string id = 1;
    string code = 2;
    string user_id = 3;
    double quantity = 4;
    double initial_valuation = 5;
    double amount = 6;
    string date = 7;
    string description = 8;
    AssetCode asset = 9;
    string created_at = 10;
    string updated_at = 11;
}

message InvestmentSold {
    string id = 1;
    string investment_id = 2;
    string user_id = 3;
    double quantity = 4;
    double sell_price = 5;
    double amount = 6;
    string date = 7;
    string description = 8;
    double deficit = 9;
    string created_at = 10;
    string updated_at = 11;
    AssetCode asset = 12;
}

message InvestmentID {
    string id = 1;
}

message UserID {
    string id = 1;
}

message GetInvestmentOptions {
    int32 limit = 1;
}

// ── Request Messages ──

message GetUserInvestmentListRequest {
    string user_id = 1;
    int32 page = 2;
    int32 page_size = 3;
    string sort_by = 4;
    string sort_order = 5;
    string search = 6;
    string code = 7;
}

message GetInvestmentDetailRequest {
    string user_id = 1;
    string investment_id = 2;
}

message CreateInvestmentRequest {
    string user_id = 1;
    string code = 2;
    double quantity = 3;
    double amount = 4;
    double initial_valuation = 5;
    string date = 6;
    string description = 7;
}

message SellInvestmentRequest {
    string user_id = 1;
    string asset_code = 2;
    double quantity = 3;
    double amount = 4;
    string date = 5;
    string description = 6;
}

// ── Response Messages ──

message GetUserInvestmentListResponse {
    repeated Investment investments = 1;
    int32 total = 2;
    int32 page = 3;
    int32 page_size = 4;
    int32 total_pages = 5;
}

message SellInvestmentResponse {
    repeated InvestmentSold sold_records = 1;
}

message InvestmentSummaryResponse {
    int32 total_investments = 1;
    double total_invested = 2;
    double total_current_value = 3;
    double total_profit_loss = 4;
    double total_profit_loss_pct = 5;
    double total_sold_amount = 6;
    double total_realized_gain = 7;
}

message GetAssetCodesResponse {
    repeated AssetCode asset_codes = 1;
}